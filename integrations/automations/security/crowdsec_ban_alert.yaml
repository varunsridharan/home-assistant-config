alias: "🚨 CrowdSec - New Ban Alert"
id: crowdsec_new_ban_alert
description: "Sends an alert when CrowdSec bans a new IP address. Includes IP, scenario, duration and type."
mode: single
triggers:
  - trigger: event
    event_type: crowdsec_new_decision
actions:
  - action: notify.send_message
    target:
      entity_id: notify.varun_notify_all
    data:
      message: |
        🚨 CrowdSec New Ban

        🌐 IP: {{ trigger.event.data.value }}
        ⚠️ Scenario: {{ trigger.event.data.scenario }}
        ⏱️ Duration: {{ trigger.event.data.duration }}
        🔒 Type: {{ trigger.event.data.type }}
        📊 Total Active Bans: {{ states('sensor.crowdsec_active_decisions') }}
  - action: notify.mailgun_relay
    data:
      title: "🚨 CrowdSec New Ban Alert"
      message: |
        🌐 IP: {{ trigger.event.data.value }}
        ⚠️ Scenario: {{ trigger.event.data.scenario }}
        ⏱️ Duration: {{ trigger.event.data.duration }}
        🔒 Type: {{ trigger.event.data.type }}
        📊 Total Active Bans: {{ states('sensor.crowdsec_active_decisions') }}