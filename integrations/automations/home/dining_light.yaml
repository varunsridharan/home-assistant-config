alias: "💡 Dining Light"
id: dining_light_schedule
description: "Manages dining light schedule, night mode and power cut recovery."
mode: restart

triggers:
  - trigger: time
    at: "05:30:00"
    id: schedule_530am
  - trigger: time
    at: "06:00:00"
    id: schedule_6am
  - trigger: time
    at: "17:00:00"
    id: schedule_5pm
  - trigger: time
    at: "20:30:00"
    id: schedule_830pm
  - trigger: state
    entity_id: light.dining_9w
    from: unavailable
    to: "on"
    id: power_recovery

actions:
  - choose:

      - conditions:
          - condition: trigger
            id: schedule_530am
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 100

      - conditions:
          - condition: trigger
            id: schedule_6am
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.dining_9w

      - conditions:
          - condition: trigger
            id: schedule_5pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 100

      - conditions:
          - condition: trigger
            id: schedule_830pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_9w
            data:
              color_temp_kelvin: 2000
              brightness_pct: 15

      - conditions:
          - condition: trigger
            id: power_recovery
        sequence:
          - choose:
              - conditions:
                  - condition: time
                    after: "20:30:00"
                    before: "05:30:00"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: light.dining_9w
                    data:
                      color_temp_kelvin: 2000
                      brightness_pct: 15
              - conditions:
                  - condition: time
                    after: "06:00:00"
                    before: "16:30:00"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: light.dining_9w
