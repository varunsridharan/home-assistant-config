alias: "💡 Kitchen Light"
id: kitchen_light_schedule
description: "Manages kitchen light schedule, night mode, door sensor override and power cut recovery."
mode: restart

triggers:
  - trigger: time
    at: "05:00:00"
    id: schedule_5am
  - trigger: time
    at: "05:30:00"
    id: schedule_530am
  - trigger: time
    at: "05:45:00"
    id: schedule_545am
  - trigger: time
    at: "17:00:00"
    id: schedule_5pm
  - trigger: time
    at: "17:30:00"
    id: schedule_530pm
  - trigger: time
    at: "18:00:00"
    id: schedule_6pm
  - trigger: time
    at: "19:00:00"
    id: schedule_7pm
  - trigger: time
    at: "20:00:00"
    id: schedule_8pm
  - trigger: time
    at: "20:30:00"
    id: schedule_830pm
  - trigger: time
    at: "20:45:00"
    id: schedule_845pm
  - trigger: state
    entity_id: binary_sensor.back_corridor_kitchen_door
    id: door_sensor
  - trigger: state
    entity_id: light.kitchen_9w
    from: unavailable
    to: "on"
    id: power_recovery

actions:
  - choose:

      - conditions:
          - condition: trigger
            id: schedule_5am
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 100

      - conditions:
          - condition: trigger
            id: schedule_530am
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 100

      - conditions:
          - condition: trigger
            id: schedule_545am
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.kitchen_9w

      - conditions:
          - condition: trigger
            id: schedule_5pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 100

      - conditions:
          - condition: trigger
            id: schedule_530pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 75

      - conditions:
          - condition: trigger
            id: schedule_6pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 50

      - conditions:
          - condition: trigger
            id: schedule_7pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 100

      - conditions:
          - condition: trigger
            id: schedule_8pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 50

      - conditions:
          - condition: trigger
            id: schedule_830pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 6500
              brightness_pct: 25

      - conditions:
          - condition: trigger
            id: schedule_845pm
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.kitchen_9w
            data:
              color_temp_kelvin: 2000
              brightness_pct: 15

      - conditions:
          - condition: trigger
            id: door_sensor
          - condition: time
            after: "20:45:00"
            before: "05:00:00"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.back_corridor_kitchen_door
                    state: "on"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: light.kitchen_9w
                    data:
                      color_temp_kelvin: 6500
                      brightness_pct: 100
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.back_corridor_kitchen_door
                    state: "off"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: light.kitchen_9w
                    data:
                      color_temp_kelvin: 2000
                      brightness_pct: 15

      - conditions:
          - condition: trigger
            id: power_recovery
        sequence:
          - choose:
              - conditions:
                  - condition: time
                    after: "20:45:00"
                    before: "05:00:00"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: light.kitchen_9w
                    data:
                      color_temp_kelvin: 2000
                      brightness_pct: 15
              - conditions:
                  - condition: time
                    after: "05:40:00"
                    before: "17:00:00"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: light.kitchen_9w
