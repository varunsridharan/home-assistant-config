id: npm_pihole_host_created
alias: "🌐 NPM ↔ Pi-hole: Host created → Add DNS"
description: "When a new NPM reverse proxy host is added, create matching Pi-hole DNS record"
mode: queued
max: 10
trigger:
  - trigger: event
    event_type: entity_registry_updated
    event_data:
      action: create
condition:
  - condition: template
    value_template: >
      {{ trigger.event.data.entity_id.startswith('switch.reverse_proxy_') }}
action:
  - variables:
      target_entity: "{{ trigger.event.data.entity_id }}"

  - wait_template: "{{ state_attr(target_entity, 'domain_names') is not none }}"
    timeout: "00:00:15"
    continue_on_timeout: false

  - variables:
      domain_raw: "{{ state_attr(target_entity, 'domain_names') }}"
      domains: "{{ [domain_raw] if domain_raw is string else domain_raw }}"

  - action: rest_command.pihole_auth
    data:
      pihole_host: !secret pihole_host
      pihole_password: !secret pihole_password
    response_variable: auth_response

  - variables:
      token: "{{ (auth_response['content'] | from_json).session.sid }}"

  - repeat:
      for_each: "{{ domains }}"
      sequence:
        - action: rest_command.pihole_dns_add
          data:
            pihole_host: !secret pihole_host
            domain: "{{ repeat.item }}"
            token: "{{ token }}"

  - action: rest_command.pihole_logout
    data:
      pihole_host: !secret pihole_host
      token: "{{ token }}"

  - action: notify.varun_notify_all
    data:
      message: "🌐 DNS Added: {{ domains | join(', ') }} → 10.0.2.1 (new host)"