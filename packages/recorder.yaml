# https://www.home-assistant.io/integrations/recorder/
recorder:
  db_url: !secret db_url
  commit_interval: 10
  auto_purge: false
  purge_keep_days: 30
  exclude:
    entity_globs:
      - sensor.unifi_*_rx_*
      - sensor.unifi_*_tx_*
      - sensor.opnsense_*_rate_*
    entities:
      - sensor.date
      - sensor.time
